name: kuryente
description: "Waze for the Philippine Energy Crisis — Live brownout tracking, fuel availability, and community mutual aid."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  http: ^1.2.2
  html: ^0.15.5
  shared_preferences: ^2.3.4
  provider: ^6.1.2
  fl_chart: ^0.69.2
  google_generative_ai: ^0.4.6
  url_launcher: ^6.3.1
  intl: ^0.20.2
  geolocator: ^13.0.2
  geolocator_web: ^4.1.1
  firebase_core: ^4.7.0
  cloud_firestore: ^6.3.0
  firebase_auth: ^6.4.0
  google_sign_in: ^7.2.0
  flutter_map_cancellable_tile_provider: ^3.0.2
  image_picker: ^1.2.2
  flutter_dotenv: ^6.0.1
  firebase_messaging: ^16.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
