name: kuryente
description: "Waze for the Philippine Energy Crisis — Live brownout tracking, fuel availability, and community mutual aid."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  http: ^1.2.2
  html: ^0.15.5
  shared_preferences: ^2.3.4
  provider: ^6.1.2
  fl_chart: ^0.69.2
  google_generative_ai: ^0.4.6
  url_launcher: ^6.3.1
  intl: ^0.20.2
  geolocator: ^13.0.2
  geolocator_web: ^4.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
